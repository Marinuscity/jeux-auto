<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur de Dialogue</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F0F4F8;min-height:100vh;padding:16px}
#app{max-width:580px;margin:0 auto}
h1{font-size:21px;font-weight:700;color:#111;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc-card{background:white;border-radius:14px;padding:16px;border:2px solid #eee;cursor:pointer;transition:all .15s;text-align:center}
.sc-card:hover{border-color:#378ADD;transform:translateY(-1px)}
.sc-card.done{border-color:#639922;background:#f8fff4}
.sc-icon{font-size:32px;margin-bottom:6px}
.sc-name{font-size:13px;font-weight:700;color:#111}
.sc-done{font-size:11px;color:#639922;margin-top:4px;font-weight:600}
.chat-box{background:white;border-radius:16px;overflow:hidden;margin-bottom:12px;border:1px solid #eee}
.chat-head{padding:12px 16px;background:#378ADD;color:white;display:flex;align-items:center;gap:10px}
.chat-head-icon{font-size:26px}
.chat-head-name{font-size:14px;font-weight:700}
.chat-head-ctx{font-size:11px;opacity:.85}
.chat-msgs{padding:14px;min-height:180px;display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto}
.bubble-wrap{display:flex;flex-direction:column}
.bubble-wrap.me{align-items:flex-end}
.bubble-lbl{font-size:10px;color:#aaa;margin-bottom:2px}
.bubble{max-width:88%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5}
.bubble.other{background:#f0f0f0;color:#111;border-bottom-left-radius:4px}
.bubble.me-ok{background:#378ADD;color:white;border-bottom-right-radius:4px}
.bubble.me-warn{background:#FAEEDA;color:#633806;border:1.5px solid #BA7517;border-bottom-right-radius:4px}
.bubble.me-bad{background:#FCEBEB;color:#791F1F;border:1.5px solid #E24B4A;border-bottom-right-radius:4px}
.reaction{border-radius:10px;padding:10px 13px;font-size:13px;margin-bottom:10px;line-height:1.5;border:1px solid}
.r-ok{background:#EAF3DE;color:#27500A;border-color:#97C459}
.r-warn{background:#FAEEDA;color:#633806;border-color:#FAC775}
.r-bad{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.choice{background:white;border:2px solid #ddd;border-radius:12px;padding:12px 14px;font-size:13px;color:#111;cursor:pointer;text-align:left;line-height:1.4;transition:all .13s;display:flex;align-items:flex-start;gap:8px}
.choice:hover:not([disabled]){border-color:#378ADD;background:#EBF4FF}
.choice[disabled]{cursor:default}
.ltr{min-width:22px;height:22px;border-radius:6px;background:#eee;color:#555;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ltr-ok{background:#378ADD;color:white}
.ltr-warn{background:#BA7517;color:white}
.ltr-bad{background:#E24B4A;color:white}
.ltr-reveal{background:#639922;color:white}
.choice.dim{opacity:.4}
.voice-bar{display:flex;align-items:center;gap:10px;background:white;border-radius:12px;padding:10px 14px;margin-bottom:10px;border:1px solid #eee}
.mic-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mic-idle{background:#eee;color:#555}
.mic-on{background:#E24B4A;color:white;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.voice-status{font-size:12px;color:#888;flex:1;line-height:1.4}
.speak-btn{background:#f0f0f0;border:none;border-radius:8px;padding:6px 10px;font-size:11px;color:#555;cursor:pointer;white-space:nowrap}
.speak-btn:hover{background:#378ADD;color:white}
.prog{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.prog-dot{height:7px;border-radius:4px;background:#ddd;width:28px}
.pd-ok{background:#639922}
.pd-warn{background:#BA7517}
.pd-bad{background:#E24B4A}
.pd-active{background:#378ADD}
.btn{padding:10px 20px;border-radius:10px;border:1.5px solid #ddd;background:white;cursor:pointer;font-size:13px;font-weight:600;color:#333;margin-right:8px;margin-bottom:8px;display:inline-block}
.btn:hover{background:#f0f0f0}
.btn-p{background:#378ADD;color:white;border-color:#378ADD}
.btn-p:hover{background:#185FA5}
.btn-back{background:none;border:none;color:#888;cursor:pointer;font-size:13px;padding:0;margin-bottom:14px;display:flex;align-items:center;gap:4px}
.score-big{font-size:48px;font-weight:700;text-align:center;margin:14px 0 4px;color:#111}
.score-sub{text-align:center;font-size:14px;color:#555;margin-bottom:16px;line-height:1.5}
.tip{background:#E6F1FB;border-radius:12px;padding:13px;font-size:13px;color:#0C447C;line-height:1.6;margin-bottom:14px}
.error-list{background:white;border-radius:12px;border:1px solid #eee;overflow:hidden;margin-bottom:14px}
.error-item{padding:11px 14px;border-bottom:1px solid #f0f0f0;font-size:13px;line-height:1.5}
.error-item:last-child{border-bottom:none}
.error-q{color:#888;font-size:11px;margin-bottom:3px}
.error-said{color:#E24B4A;margin-bottom:2px}
.error-better{color:#27500A}
.badges{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.badge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}
</style>
</head>

// ─── STATE ────────────────────────────────────────────────────────────────────
let S={screen:"menu",scIdx:0,stepId:"",msgs:[],log:[],chosen:null,feedback:null,done:{}};
const letters=["A","B","C","D"];

function sc(){return SCENARIOS[S.scIdx];}
function step(){return S.stepId?sc().steps[S.stepId]:null;}

// ─── SYNTHÈSE VOCALE ──────────────────────────────────────────────────────────
const synth=window.speechSynthesis;
function speak(text){
  if(!synth) return;
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";u.rate=0.9;u.pitch=1.05;
  synth.speak(u);
}

// ─── RECONNAISSANCE VOCALE ────────────────────────────────────────────────────
let recognition=null;
if(window.SpeechRecognition||window.webkitSpeechRecognition){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang="fr-FR";recognition.continuous=false;recognition.interimResults=false;
}

function startListen(cb){
  if(!recognition){cb(null);return;}
  recognition.start();
  recognition.onresult=e=>cb(e.results[0][0].transcript);
  recognition.onerror=()=>cb(null);
  recognition.onend=()=>{};
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const g=document.getElementById("app");
  ({menu:renderMenu,chat:renderChat,end:renderEnd}[S.screen]||renderMenu)(g);
}

function renderMenu(g){
  const cards=SCENARIOS.map((s,i)=>`
    <div class="sc-card${S.done[s.id]?" done":""}" onclick="startSc(${i})">
      <div class="sc-icon">${s.icon}</div>
      <div class="sc-name">${s.name}</div>
      ${S.done[s.id]?'<div class="sc-done">✅ Terminé</div>':''}
    </div>`).join("");
  g.innerHTML=`<h1>💬 Simulateur de dialogue</h1>
    <p class="subtitle">Entraîne-toi à communiquer dans la vie de tous les jours. Choisis une situation.</p>
    <div class="grid">${cards}</div>
    <div class="tip">💡 <b>Comment jouer :</b> Lis la réplique, puis choisis parmi 4 réponses. La bonne n'est pas toujours la première ! Le scénario change selon ce que tu dis. 🔊 Appuie sur Réécouter pour entendre la réplique.</div>`;
}

function startSc(i){
  S.scIdx=i;S.stepId=sc().start;S.msgs=[];S.log=[];S.chosen=null;S.feedback=null;S.screen="chat";
  const intro=step().other;
  S.msgs.push({who:"other",text:intro});
  render();
  setTimeout(()=>speak(intro),400);
}

function renderChat(g){
  const s=sc();
  const st=step();
  // Dots de progression
  let dots='<div class="prog">';
  S.log.forEach(l=>dots+=`<div class="prog-dot pd-${l.q}"></div>`);
  if(st) dots+='<div class="prog-dot pd-active"></div>';
  dots+='</div>';

  // Messages
  const msgs=S.msgs.map(m=>`
    <div class="bubble-wrap${m.who==="me"?" me":""}">
      <div class="bubble-lbl">${m.who==="other"?s.who:"Moi"}</div>
      <div class="bubble ${m.cls||m.who}">${m.text}</div>
    </div>`).join("");

  // Feedback
  let fb="";
  if(S.feedback){
    fb=`<div class="reaction r-${S.feedback.type}">${S.feedback.msg}</div>`;
  }

  // Choix
  let choicesHtml="";
  if(st && S.chosen===null){
    choicesHtml='<div class="choices">'+
      st.choices.map((c,i)=>`
        <button class="choice" onclick="choose(${i})">
          <span class="ltr">${letters[i]}</span>${c.text}
        </button>`).join("")+
      '</div>';
  } else if(st && S.chosen!==null){
    const ch=st.choices[S.chosen];
    choicesHtml='<div class="choices">'+
      st.choices.map((c,i)=>{
        let ltrCls="ltr";
        let btnCls="choice dim";
        if(i===S.chosen){ltrCls="ltr ltr-"+c.q;btnCls="choice";}
        else if(c.q==="ok" && ch.q!=="ok") ltrCls="ltr ltr-reveal";
        return`<button class="choice${i===S.chosen?"":" dim"}" disabled>
          <span class="${ltrCls}">${letters[i]}</span>${c.text}
        </button>`;
      }).join("")+
      '</div>'+
      `<button class="btn btn-p" onclick="nextStep()">${ch.next?"Continuer →":"Voir mon bilan"}</button>`;
  }

  // Barre micro/son
  const voiceBar=`<div class="voice-bar">
    <button class="mic-btn mic-idle" id="mic" onclick="toggleMic()" title="Répondre à voix haute">🎤</button>
    <span class="voice-status" id="vstatus">Choisis une réponse ou parle avec le micro.</span>
    <button class="speak-btn" onclick="speakLast()">🔊 Réécouter</button>
  </div>`;

  g.innerHTML=`
    <button class="btn-back" onclick="S.screen='menu';synth&&synth.cancel();render()">← Retour</button>
    ${dots}
    <div class="chat-box">
      <div class="chat-head">
        <div class="chat-head-icon">${s.icon}</div>
        <div><div class="chat-head-name">${s.who}</div><div class="chat-head-ctx">${s.ctx}</div></div>
      </div>
      <div class="chat-msgs" id="cmsg">${msgs}</div>
    </div>
    ${fb}
    ${voiceBar}
    ${choicesHtml}`;
  const cm=document.getElementById("cmsg");
  if(cm) cm.scrollTop=cm.scrollHeight;
}

function choose(i){
  if(S.chosen!==null) return;
  const st=step();
  const c=st.choices[i];
  S.chosen=i;
  const cls=c.q==="ok"?"me-ok":c.q==="warn"?"me-warn":"me-bad";
  S.msgs.push({who:"me",text:c.text,cls});
  S.log.push({q:c.q,said:c.text,tip:c.tip||"",stepOther:st.other,better:st.choices.find(x=>x.q==="ok")?.text||""});
  if(c.q==="ok") S.feedback={type:"ok",msg:"✅ Parfait !"};
  else if(c.q==="warn") S.feedback={type:"warn",msg:"😬 Ça peut marcher mais c'est approximatif."+(c.tip?" "+c.tip:"")};
  else S.feedback={type:"bad",msg:"❌ Cette réponse n'est pas adaptée."+(c.tip?" "+c.tip:"")};
  render();
  if(c.r) setTimeout(()=>{S.msgs.push({who:"other",text:c.r});speak(c.r);},700);
}

function nextStep(){
  const c=step().choices[S.chosen];
  S.chosen=null;S.feedback=null;
  if(!c.next){S.done[sc().id]=true;S.screen="end";render();return;}
  S.stepId=c.next;
  render();
}

function speakLast(){
  const last=S.msgs.filter(m=>m.who==="other").pop();
  if(last) speak(last.text);
}

function toggleMic(){
  const mic=document.getElementById("mic");
  const vs=document.getElementById("vstatus");
  if(!recognition){vs&&(vs.textContent="🎤 Micro non disponible sur ce navigateur (utilise Chrome).");return;}
  mic&&(mic.className="mic-btn mic-on");
  vs&&(vs.textContent="🎤 J'écoute…");
  startListen(txt=>{
    mic&&(mic.className="mic-btn mic-idle");
    if(txt){
      vs&&(vs.textContent='Tu as dit : "'+txt+'"');
      matchVoice(txt);
    } else {
      vs&&(vs.textContent="Je n'ai pas compris. Choisis une réponse.");
    }
  });
}

function matchVoice(txt){
  const st=step();
  if(!st||S.chosen!==null) return;
  const lo=txt.toLowerCase();
  let best=0,bestScore=0;
  st.choices.forEach((c,i)=>{
    const words=c.text.toLowerCase().replace(/[^\w\s]/g,"").split(/\s+/).filter(w=>w.length>3);
    const score=words.length?words.filter(w=>lo.includes(w)).length/words.length:0;
    if(score>bestScore){bestScore=score;best=i;}
  });
  choose(best);
}

function renderEnd(g){
  const ok=S.log.filter(l=>l.q==="ok").length;
  const warn=S.log.filter(l=>l.q==="warn").length;
  const bad=S.log.filter(l=>l.q==="bad").length;
  const total=S.log.length;
  const pct=total?Math.round(ok/total*100):0;

  let msg="",color="";
  if(pct>=80){msg="Excellent ! Tu communiques très bien dans cette situation.";color="#27500A";}
  else if(pct>=55){msg="Bien joué ! Encore un peu d'entraînement et ce sera parfait.";color="#185FA5";}
  else if(pct>=35){msg="Pas mal, mais il y a des points à améliorer. Lis le bilan ci-dessous.";color="#633806";}
  else{msg="Il faut s'entraîner davantage. Relis le bilan pour comprendre ce qui n'allait pas.";color="#791F1F";}

  // Erreurs détaillées (warn + bad seulement)
  const errors=S.log.filter(l=>l.q!=="ok");
  let errorSection="";
  if(errors.length>0){
    const items=errors.map(l=>`
      <div class="error-item">
        <div class="error-q">🗣 ${l.stepOther}</div>
        <div class="error-said">❌ Tu as dit : "${l.said}"</div>
        ${l.tip?`<div style="font-size:12px;color:#888;margin:2px 0">➜ ${l.tip}</div>`:""}
        ${l.better?`<div class="error-better">✅ Mieux : "${l.better}"</div>`:""}
      </div>`).join("");
    errorSection=`
      <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:8px">📋 Ce qu'on peut améliorer</div>
      <div class="error-list">${items}</div>`;
  } else {
    errorSection=`<div class="tip">🎉 Aucune erreur ! Tu as parfaitement géré cette situation.</div>`;
  }

  g.innerHTML=`
    <h1>${sc().icon} ${sc().name}</h1>
    <div class="score-big">${ok}/${total}</div>
    <div class="score-sub" style="color:${color}">${msg}</div>
    <div class="badges">
      <span class="badge" style="background:#EAF3DE;color:#27500A">✅ ${ok} parfaites</span>
      ${warn?`<span class="badge" style="background:#FAEEDA;color:#633806">😬 ${warn} approx.</span>`:""}
      ${bad?`<span class="badge" style="background:#FCEBEB;color:#791F1F">❌ ${bad} inadaptées</span>`:""}
    </div>
    ${errorSection}
    <button class="btn btn-p" onclick="startSc(S.scIdx)">Recommencer</button>
    <button class="btn" onclick="S.screen='menu';render()">Autre scénario</button>`;
}

render();
</script>
