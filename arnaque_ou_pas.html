<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arnaque ou Pas ?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F0F4F8;min-height:100vh;padding:16px}
#app{max-width:600px;margin:0 auto}
h1{font-size:22px;font-weight:700;color:#111;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:20px;line-height:1.5}

/* MENU */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cat-card{background:white;border-radius:14px;padding:16px;border:2px solid #eee;cursor:pointer;transition:all .15s;text-align:center}
.cat-card:hover{border-color:#378ADD;transform:translateY(-2px)}
.cat-card.done{border-color:#639922;background:#f6fff0}
.cat-icon{font-size:32px;margin-bottom:6px}
.cat-name{font-size:13px;font-weight:700;color:#111;margin-bottom:2px}
.cat-count{font-size:11px;color:#888}

/* SCENARIO */
.phone-frame{background:white;border-radius:18px;border:2px solid #ddd;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.phone-top{background:#222;padding:10px 16px;display:flex;align-items:center;gap:10px}
.phone-icon{font-size:20px}
.phone-from{font-size:13px;font-weight:700;color:white}
.phone-type{font-size:10px;color:#aaa}
.phone-body{padding:16px}
.msg-bubble{background:#f0f0f0;border-radius:14px;border-top-left-radius:4px;padding:13px 15px;font-size:14px;line-height:1.6;color:#111;margin-bottom:8px;position:relative}
.msg-bubble.email{background:#fff;border:1px solid #eee;border-radius:10px}
.msg-subject{font-size:12px;font-weight:700;color:#555;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #eee}
.msg-bubble.sms{background:#dcf8c6;border-radius:14px;border-top-left-radius:4px}
.msg-bubble.appel{background:#E6F1FB;border-radius:14px}
.msg-bubble.site{background:#fff8f0;border:1px dashed #f0a020;border-radius:10px;font-size:13px}
.urgence-tag{display:inline-block;background:#E24B4A;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px}
.official-tag{display:inline-block;background:#639922;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px}

/* BOUTONS CHOIX */
.choice-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.choice-btn{padding:16px 12px;border-radius:14px;border:2.5px solid #ddd;background:white;cursor:pointer;font-size:15px;font-weight:700;transition:all .13s;text-align:center}
.choice-btn:hover:not([disabled]){transform:scale(1.02)}
.btn-arnaque:hover:not([disabled]){border-color:#E24B4A;background:#fff0f0;color:#E24B4A}
.btn-vrai:hover:not([disabled]){border-color:#639922;background:#f0fff0;color:#639922}
.btn-arnaque.selected{border-color:#E24B4A;background:#E24B4A;color:white}
.btn-vrai.selected{border-color:#639922;background:#639922;color:white}
.btn-arnaque.wrong{border-color:#E24B4A;background:#FCEBEB;color:#E24B4A}
.btn-vrai.wrong{border-color:#E24B4A;background:#FCEBEB;color:#E24B4A}
.btn-arnaque.correct{border-color:#639922;background:#EAF3DE;color:#639922}
.btn-vrai.correct{border-color:#639922;background:#EAF3DE;color:#639922}

/* FEEDBACK */
.feedback{border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13px;line-height:1.6;border:1px solid}
.fb-ok{background:#EAF3DE;border-color:#97C459;color:#27500A}
.fb-bad{background:#FCEBEB;border-color:#F09595;color:#791F1F}
.warning-signs{background:#FFF8E6;border:1px solid #F5C842;border-radius:10px;padding:11px 13px;font-size:12px;color:#633806;margin-top:8px;line-height:1.7}
.warning-signs b{color:#111}

/* INDICES */
.indices-btn{background:none;border:1px dashed #ccc;border-radius:8px;padding:7px 12px;font-size:12px;color:#888;cursor:pointer;margin-bottom:10px;width:100%}
.indices-btn:hover{border-color:#378ADD;color:#378ADD}
.indices-box{background:#f8f8f8;border-radius:10px;padding:11px 13px;font-size:12px;color:#555;margin-bottom:10px;line-height:1.7;display:none}
.indices-box.show{display:block}

/* PROGRESS */
.prog{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.prog-dot{height:7px;border-radius:4px;background:#ddd;width:26px}
.pd-ok{background:#639922}
.pd-bad{background:#E24B4A}
.pd-active{background:#378ADD}

/* SCORE FINAL */
.score-big{font-size:50px;font-weight:700;text-align:center;margin:14px 0 4px;color:#111}
.score-sub{text-align:center;font-size:14px;color:#555;margin-bottom:18px;line-height:1.5}
.cat-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.cat-result{background:white;border-radius:12px;border:1px solid #eee;padding:11px 13px}
.cr-name{font-size:11px;color:#888;margin-bottom:3px}
.cr-score{font-size:15px;font-weight:700;color:#111}
.error-section{background:white;border-radius:12px;border:1px solid #eee;overflow:hidden;margin-bottom:16px}
.error-item{padding:12px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}
.error-item:last-child{border-bottom:none}
.ei-label{font-size:10px;color:#888;margin-bottom:4px}
.ei-verdict{font-weight:700;margin-bottom:4px}
.ei-why{color:#555;line-height:1.5}

/* BOUTONS */
.btn{display:inline-block;padding:10px 22px;border-radius:10px;border:1.5px solid #ddd;background:white;cursor:pointer;font-size:13px;font-weight:600;color:#333;margin-right:8px;margin-bottom:8px}
.btn:hover{background:#f0f0f0}
.btn-p{background:#378ADD;color:white;border-color:#378ADD}
.btn-p:hover{background:#185FA5}
.btn-back{background:none;border:none;color:#888;cursor:pointer;font-size:13px;padding:0;margin-bottom:14px;display:flex;align-items:center;gap:4px}
.tip{background:#E6F1FB;border-radius:12px;padding:13px;font-size:13px;color:#0C447C;line-height:1.6;margin-bottom:14px}
.stat-badges{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.badge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CATEGORIES=[
  {id:"sms",icon:"📱",name:"SMS suspects",color:"#E24B4A"},
  {id:"email",icon:"📧",name:"Emails",color:"#BA7517"},
  {id:"telephone",icon:"📞",name:"Appels téléphoniques",color:"#534AB7"},
  {id:"site",icon:"🌐",name:"Sites web",color:"#378ADD"},

const SCENARIOS=[
  // ─── SMS ───
  {id:1,cat:"sms",arnaque:true,
   type:"SMS",from:"Numéro inconnu +33 6 12 34 56 78",icon:"📱",
   content:`<span class="urgence-tag">⚠️ URGENT</span><br>Votre colis n°FR847261 n'a pas pu être livré. Frais de réexpédition : 1,99€. Payez avant 24h sinon retour expéditeur :<br><b>www.chronopost-livraison-fr.com</b>`,
   style:"sms",
   indices:["Tu n'attends aucun colis","L'URL ne ressemble pas à un vrai site Chronopost","Le vrai Chronopost envoie des SMS sans demander de paiement","'URGENT' et '24h' sont des techniques de pression"],
   explication:"C'est une arnaque classique au colis. Les vrais transporteurs ne demandent jamais de payer 1,99€ par SMS. Le lien mène vers un faux site qui vole tes coordonnées bancaires.",
   signaux:["URL bizarre (chronopost-livraison-fr.com ≠ chronopost.fr)","Pression temporelle '24h'","Demande de paiement par SMS","Colis que tu n'attendais pas"]},

  {id:2,cat:"sms",arnaque:false,
   type:"SMS",from:"LA BANQUE POSTALE",icon:"🏦",
   content:`Votre virement de 250€ vers M. DUPONT a bien été enregistré. Votre solde est de 1 420€. Pour toute question : 3639 (service client).`,

   explication:"C'est un vrai SMS de confirmation de ta banque. Il t'informe d'un virement que tu as effectué. Un vrai SMS bancaire ne demande jamais de cliquer sur un lien ou de rappeler un numéro inconnu.",
   signaux:[]},

  {id:3,cat:"sms",arnaque:true,
   type:"SMS",from:"+33 7 45 12 89 33",icon:"📱",
   content:`Félicitations ! Vous avez été sélectionné(e) pour recevoir un iPhone 15 GRATUIT. Répondez OUI maintenant pour valider votre gain. Offre valable 2h seulement !`,
   style:"sms",
   indices:["Tu n'as participé à aucun concours","'GRATUIT' + pression de temps = arnaque classique","Les vrais concours ne se font pas par SMS inconnu","Répondre 'OUI' peut activer un abonnement payant"],
   explication:"Arnaque au faux concours. En répondant OUI tu t'abonnes à des services SMS surtaxés qui te coûtent plusieurs euros par semaine. Aucune entreprise sérieuse ne donne des iPhones par SMS.",

  {id:4,cat:"sms",arnaque:true,
   type:"SMS",from:"Numéro masqué",icon:"📱",

  {id:5,cat:"sms",arnaque:false,

   content:`Votre facture du mois de juin est disponible sur free.fr/account. Montant : 19,99€. Prélèvement le 10/07. Contact : 3244.`,
   style:"sms",
   indices:["Le SMS vient de FREE MOBILE (expéditeur officiel)","Il t'informe d'une facture, ne te demande pas de payer par SMS","L'URL free.fr est le vrai site Free","Il donne le numéro officiel Free (3244)"],

  {id:6,cat:"sms",arnaque:true,

   content:`SECURITE BANCAIRE : Votre carte a été utilisée à l'étranger pour 847€. Si ce n'est pas vous, appelez MAINTENANT le 06 99 88 77 66 pour bloquer la transaction.`,

   type:"Email",from:"service-client@impots-gouv.fr.remboursement.com",icon:"📧",
   content:`<div class="msg-subject">Remboursement fiscal en attente — Réf. 2024-FR-447821</div>Monsieur/Madame,<br><br>Suite à notre contrôle annuel, nous avons détecté un trop-perçu de <b>247,83€</b> en votre faveur.<br><br>Pour recevoir votre remboursement, veuillez mettre à jour vos coordonnées bancaires sur notre portail sécurisé dans les 5 jours ouvrables.<br><br><a href="#">👉 Accéder à mon remboursement</a><br><br>Direction Générale des Finances Publiques`,
   style:"email",
   indices:["L'adresse email est fausse : impots-gouv.fr.remboursement.com ≠ impots.gouv.fr","Les impôts remboursent automatiquement, ils ne demandent pas tes coordonnées bancaires par email","Montant précis (247,83€) pour paraître crédible","Le vrai site des impôts c'est impots.gouv.fr"],
   explication:"Faux email des impôts (phishing). L'adresse de l'expéditeur contient 'impots-gouv.fr' mais le vrai domaine est 'remboursement.com'. Les impôts ne demandent jamais les coordonnées bancaires par email.",
   signaux:["Adresse email suspecte (domaine ≠ impots.gouv.fr)","Demande de coordonnées bancaires","Délai artificiel de 5 jours","Lien cliquable vers un faux portail"]},

  {id:8,cat:"email",arnaque:false,
   type:"Email",from:"no-reply@pole-emploi.fr",icon:"📧",
   content:`<div class="msg-subject">Votre actualisation mensuelle — Juillet 2024</div>Bonjour,<br><br>Votre actualisation du mois de juillet a bien été prise en compte. Votre allocation sera versée le 15 juillet 2024.<br><br>Pour toute question, connectez-vous sur pole-emploi.fr ou appelez le 3949.<br><br>France Travail`,
   style:"email",

   explication:"C'est un vrai email de France Travail (ex Pôle Emploi). Il confirme ton actualisation mensuelle. Il ne contient aucun lien suspect ni demande d'informations personnelles.",
   signaux:[]},

   type:"Email",from:"security@paypa1-alert.com",icon:"📧",
   content:`<div class="msg-subject">⚠️ Activité suspecte détectée sur votre compte</div>Cher(e) client(e),<br><br>Nous avons détecté une connexion non autorisée depuis la Russie.<br><br>Votre compte a été <b>temporairement limité</b>. Confirmez votre identité dans les 48h ou votre compte sera définitivement fermé.<br><br><a href="#">Confirmer mon compte →</a>`,
   style:"email",
   indices:["paypa1-alert.com avec un '1' à la place du 'l' dans paypal","PayPal ne limite pas les comptes par email sans vérification préalable","'48h ou compte fermé' = pression maximale","Le vrai PayPal utilise toujours paypal.com"],
   explication:"Phishing PayPal. L'adresse utilise '1' au lieu de 'l' dans paypal (paypa1). Cliquer sur le lien mène vers un faux site qui vole ton mot de passe et tes informations bancaires.",
   signaux:["Domaine truqué (paypa1 au lieu de paypal)","Pression '48h'","Connexion depuis un pays étranger = panique","Lien vers un faux site"]},

  {id:10,cat:"email",arnaque:true,
   type:"Email",from:"noreply@amazon-prime-renouvellement.net",icon:"📧",
   content:`<div class="msg-subject">Votre abonnement Prime expire demain</div>Bonjour,<br><br>Votre abonnement Amazon Prime expire le <b>DEMAIN</b>. Pour continuer à bénéficier de vos avantages, mettez à jour vos informations de paiement.<br><br>Sans action de votre part, votre compte sera suspendu et vos commandes en cours annulées.<br><br><a href="#">Mettre à jour maintenant →</a>`,
   style:"email",
   indices:["L'expéditeur est amazon-prime-renouvellement.net ≠ amazon.fr","Amazon écrit toujours depuis amazon.fr ou amazon.com","'DEMAIN' en majuscules = technique de pression","Le vrai Amazon te demanderait de te connecter à ton compte normalement"],
   explication:"Faux email Amazon. Le domaine amazon-prime-renouvellement.net n'appartient pas à Amazon. Si tu cliques, tu arrives sur un faux site qui vole tes coordonnées bancaires.",
   signaux:["Domaine suspect (≠ amazon.fr)","Mot 'DEMAIN' pour créer la panique","Demande de mise à jour de paiement","Menace d'annulation de commandes"]},

  {id:11,cat:"email",arnaque:false,
   type:"Email",from:"no-reply@notification.caf.fr",icon:"📧",

   indices:["Domaine notification.caf.fr — officiel","Il confirme une démarche que tu as faite","Il te renvoie vers caf.fr (site officiel) sans lien cliquable suspect","Aucune demande d'information ou de paiement"],
   explication:"Vrai email de la CAF. Il te confirme que ta déclaration a été prise en compte et te dirige vers caf.fr. Aucun signe suspect : pas de lien douteux, pas de demande de données.",
   signaux:[]},

  // ─── TELEPHONE ───
  {id:12,cat:"telephone",arnaque:true,
   type:"Appel téléphonique",from:"Numéro inconnu — 01 87 66 55 44",icon:"📞",
   content:`<span class="urgence-tag">🎙 Appel reçu</span><br><br>"Bonjour, je suis Madame Morin de votre banque. Nous avons bloqué une tentative de fraude sur votre compte. Pour sécuriser votre argent, j'ai besoin que vous me confirmiez votre numéro de carte et les 3 chiffres au dos."`,
   style:"appel",
   indices:["Ta vraie banque ne demande JAMAIS ton numéro de carte ou le code au dos","Les conseillers bancaires n'ont pas besoin de ces infos (ils les ont déjà)","Numéro inconnu ou usurpé","La vraie protection c'est de raccrocher et rappeler le numéro au dos de ta carte"],
   explication:"Arnaque au faux conseiller bancaire (vishing). C'est la technique la plus efficace : on se fait passer pour ta banque. Ta banque ne te demandera JAMAIS tes données bancaires par téléphone. Raccroche et rappelle le numéro officiel.",
   signaux:["Demande du numéro de carte","Demande du code CVV (3 chiffres au dos)","Numéro inconnu","Urgence créée ('fraude bloquée')"]},

  {id:13,cat:"telephone",arnaque:true,
   type:"Appel téléphonique",from:"Numéro inconnu",icon:"📞",
   content:`<span class="urgence-tag">🎙 Appel reçu</span><br><br>"Bonjour, j'appelle de Microsoft. Nos serveurs ont détecté un virus sur votre ordinateur. Il est urgent d'agir pour protéger vos données. Je vais vous guider pour installer un logiciel de protection à distance."`,
   style:"appel",
   indices:["Microsoft ne t'appelle jamais pour un virus sur ton PC","Aucune entreprise tech n'appelle spontanément pour des virus","Le 'logiciel de protection' est en réalité un logiciel d'accès à distance","Ils pourraient ensuite vider ton compte bancaire depuis ton PC"],
   explication:"Arnaque au faux support Microsoft. Microsoft n'appelle jamais les particuliers. Le logiciel qu'ils veulent installer leur donne accès à ton ordinateur. Ils peuvent ensuite voir tes mots de passe et accéder à ta banque.",
   signaux:["Appel non sollicité de 'Microsoft'","'Virus détecté sur votre PC'","Installation d'un logiciel à distance demandée","Urgence créée"]},

  {id:14,cat:"telephone",arnaque:false,
   type:"Appel téléphonique",from:"3040 (Numéro officiel CPAM)",icon:"📞",

   signaux:[]},

  {id:15,cat:"telephone",arnaque:true,
   type:"Appel téléphonique",from:"Numéro masqué",icon:"📞",
   content:`<span class="urgence-tag">🎙 Appel reçu</span><br><br>"Votre fils/fille a eu un accident et est à l'hôpital. Il/elle a besoin que vous viriez d'urgence 800€ pour les frais médicaux. Je suis l'infirmière qui s'occupe de lui/elle."`,
   style:"appel",
   indices:["Les hôpitaux ne demandent jamais de virement d'urgence par téléphone","Appel à l'émotion extrême = technique d'arnaque","Raccroche et appelle directement ton proche sur son téléphone","Si vraiment urgent, l'hôpital donne son numéro officiel où tu peux rappeler"],
   explication:"Arnaque à l'urgence familiale. Les escrocs jouent sur la peur pour te faire agir sans réfléchir. Raccroche immédiatement et appelle ton proche directement. Les hôpitaux ne demandent JAMAIS de virement par téléphone.",
   signaux:["Émotion extrême (accident d'un proche)","Demande de virement urgent","Numéro masqué","Aucune vérification possible de l'identité de l'appelant"]},

  {id:16,cat:"telephone",arnaque:true,
   type:"Appel téléphonique",from:"0 800 123 456",icon:"📞",
   content:`<span class="urgence-tag">🎙 Appel reçu</span><br><br>"Bonjour, nous proposons une isolation de votre logement à 1€ grâce aux aides de l'État. C'est totalement gratuit. Pouvez-vous nous donner votre numéro de sécurité sociale pour vérifier votre éligibilité ?"`,
   style:"appel",
   indices:["Les vraies aides isolation ne sont pas démarchées par téléphone à froid","Le numéro de sécurité sociale est une donnée très sensible","'À 1€' peut cacher des frais cachés énormes","Le vrai dispositif MaPrimeRénov se fait via maprimerenov.gouv.fr"],
   explication:"Arnaque à la rénovation énergétique. Ces appels peuvent mener à des travaux de mauvaise qualité facturés très cher, ou au vol de ton numéro de sécurité sociale. Les vraies aides se font via des organismes officiels, jamais par démarchage téléphonique.",
   signaux:["Démarchage téléphonique non sollicité","Demande du numéro de sécurité sociale","Offre 'trop belle' (à 1€)","Pression pour décider vite"]},

  // ─── SITES WEB ───

// ─── STATE ───
let S={
  screen:"menu",
  catId:null,
  questions:[],
  qIdx:0,
  answered:false,
  userChoice:null,
  log:[],
  done:{},
  indicesOpen:false,
};

function render(){
  const g=document.getElementById("app");
  ({menu:renderMenu,quiz:renderQuiz,end:renderEnd}[S.screen]||renderMenu)(g);
}

function renderMenu(g){
  const total=SCENARIOS.length;
  const done=Object.keys(S.done).reduce((a,k)=>a+S.done[k],0);
  const cards=CATEGORIES.map(c=>{
    const qs=SCENARIOS.filter(s=>s.cat===c.id);
    const doneCount=qs.filter(s=>S.done[s.id]!==undefined).length;
    return`<div class="cat-card${doneCount===qs.length&&qs.length>0?" done":""}" onclick="startCat('${c.id}')">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-name">${c.name}</div>
      <div class="cat-count">${doneCount}/${qs.length} vus</div>
    </div>`;
  }).join("");
  g.innerHTML=`
    <h1>🕵️ Arnaque ou pas ?</h1>
    <p class="subtitle">Entraîne-toi à reconnaître les arnaques du quotidien. SMS, emails, appels, sites web, en rue… Saurais-tu faire la différence ?</p>
    <div class="cat-grid">${cards}</div>
    <div class="tip">💡 <b>Comment jouer :</b> On te montre un message ou une situation. Tu décides : <b>🚨 Arnaque</b> ou <b>✅ Pas une arnaque</b>. Des indices sont disponibles si tu hésites. La bonne réponse t'explique pourquoi.<br><br>👉 Tu peux aussi <b onclick="startAll()" style="cursor:pointer;color:#378ADD;text-decoration:underline">tout faire en mode aléatoire</b> (tous les scénarios mélangés).</div>`;
}

function startCat(catId){
  S.catId=catId;
  S.questions=SCENARIOS.filter(s=>s.cat===catId).sort(()=>Math.random()-.5);
  S.qIdx=0;S.answered=false;S.userChoice=null;S.log=[];S.indicesOpen=false;
  S.screen="quiz";render();
}

function startAll(){
  S.catId=null;
  S.questions=[...SCENARIOS].sort(()=>Math.random()-.5);
  S.qIdx=0;S.answered=false;S.userChoice=null;S.log=[];S.indicesOpen=false;
  S.screen="quiz";render();
}

function renderQuiz(g){
  if(S.qIdx>=S.questions.length){S.screen="end";render();return;}
  const q=S.questions[S.qIdx];
  const total=S.questions.length;
  const cat=CATEGORIES.find(c=>c.id===q.cat);

  // Dots
  let dots='<div class="prog">';
  for(let i=0;i<total;i++){
    let cls="prog-dot";
    if(i<S.log.length) cls+=" "+(S.log[i].correct?"pd-ok":"pd-bad");
    else if(i===S.qIdx) cls+=" pd-active";
    dots+=`<div class="${cls}"></div>`;
  }
  dots+='</div>';

  // Contenu message
  const msgClass="msg-bubble "+(q.style||"");
  const content=`<div class="${msgClass}">${q.content}</div>`;

  // Indices
  const indicesHtml=q.indices?`
    <button class="indices-btn" onclick="toggleIndices()">🔍 ${S.indicesOpen?"Masquer les indices":"Voir des indices pour m'aider"}</button>
    <div class="indices-box${S.indicesOpen?" show":""}">${q.indices.map(i=>`• ${i}`).join('<br>')}</div>`:''

  // Zone réponse
  let responseZone='';
  if(!S.answered){
    responseZone=`
      ${indicesHtml}
      <div class="choice-row">
        <button class="choice-btn btn-arnaque" onclick="answer(true)">🚨 Arnaque !</button>
        <button class="choice-btn btn-vrai" onclick="answer(false)">✅ Pas une arnaque</button>
      </div>`;
  } else {
    const correct=S.log[S.log.length-1].correct;
    const arnaqueClass=q.arnaque?(correct?"correct":"correct"):(S.userChoice?"wrong":"");
    const vraiClass=!q.arnaque?(correct?"correct":"correct"):(S.userChoice===false?"wrong":"");
    const fb=correct
      ?`<div class="feedback fb-ok">✅ Bonne réponse ! ${q.explication}</div>`
      :`<div class="feedback fb-bad">❌ Pas tout à fait. ${q.explication}</div>`;
    const signaux=q.signaux&&q.signaux.length>0
      ?`<div class="warning-signs"><b>🚩 Signaux d'alerte :</b><br>${q.signaux.map(s=>`• ${s}`).join('<br>')}</div>`:'';
    responseZone=`
      <div class="choice-row">
        <button class="choice-btn btn-arnaque ${q.arnaque?"correct":S.userChoice?"wrong":""}" disabled>🚨 Arnaque !</button>
        <button class="choice-btn btn-vrai ${!q.arnaque?"correct":S.userChoice===false?"wrong":""}" disabled>✅ Pas une arnaque</button>
      </div>
      ${fb}${signaux}
      <button class="btn btn-p" onclick="next()">${S.qIdx<total-1?"Suivant →":"Voir mon bilan"}</button>`;
  }

  g.innerHTML=`
    <button class="btn-back" onclick="S.screen='menu';render()">← Retour</button>
    ${dots}
    <div style="font-size:11px;color:#888;margin-bottom:8px;font-weight:600">${cat?cat.icon+' '+cat.name:''} · ${S.qIdx+1}/${total}</div>
    <div class="phone-frame">
      <div class="phone-top">
        <div class="phone-icon">${q.icon}</div>
        <div>
          <div class="phone-from">${q.from}</div>
          <div class="phone-type">${q.type}</div>
        </div>
      </div>
      <div class="phone-body">${content}</div>
    </div>
    ${responseZone}`;
}

function toggleIndices(){S.indicesOpen=!S.indicesOpen;render();}

function answer(isArnaque){
  if(S.answered) return;
  S.answered=true;
  S.userChoice=isArnaque;
  const q=S.questions[S.qIdx];
  const correct=(isArnaque===q.arnaque);
  S.log.push({correct,q,userChoice:isArnaque});
  if(correct&&q.arnaque) S.done[q.id]=true;
  else if(correct&&!q.arnaque) S.done[q.id]=true;
  else S.done[q.id]=false;
  render();
}

function next(){
  S.qIdx++;S.answered=false;S.userChoice=null;S.indicesOpen=false;render();
}

function renderEnd(g){
  const ok=S.log.filter(l=>l.correct).length;
  const total=S.log.length;
  const pct=Math.round(ok/total*100);
  let msg="",color="";
  if(pct===100){msg="Parfait ! Tu repères toutes les arnaques. 🎉";color="#27500A";}
  else if(pct>=75){msg="Très bien ! Tu es bien protégé(e) contre la plupart des arnaques.";color="#185FA5";}
  else if(pct>=50){msg="Pas mal ! Mais certaines arnaques t'ont eu(e). Relis les explications.";color="#633806";}
  else{msg="Attention ! Tu es vulnérable aux arnaques. Relis bien les explications.";color="#791F1F";}

  // Erreurs
  const errors=S.log.filter(l=>!l.correct);
  let errorSection='';
  if(errors.length>0){
    const items=errors.map(l=>{
      const isArnaque=l.q.arnaque;
      const said=l.userChoice?"Arnaque":"Pas une arnaque";
      const correct=isArnaque?"Arnaque":"Pas une arnaque";
      return`<div class="error-item">
        <div class="ei-label">${l.q.icon} ${l.q.type} — ${l.q.from}</div>
        <div class="ei-verdict">Tu as dit : <span style="color:#E24B4A">${said}</span> → C'était : <span style="color:#639922">${correct}</span></div>
        <div class="ei-why">${l.q.explication}</div>
      </div>`;
    }).join('');
    errorSection=`
      <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:8px">📋 Ce que tu as raté</div>
      <div class="error-section">${items}</div>`;
  }

  // Par catégorie
  const bycat=CATEGORIES.map(c=>{
    const cqs=S.log.filter(l=>l.q.cat===c.id);
    if(!cqs.length) return'';
    const cok=cqs.filter(l=>l.correct).length;
    return`<div class="cat-result">
      <div class="cr-name">${c.icon} ${c.name}</div>
      <div class="cr-score">${cok}/${cqs.length}</div>
    </div>`;
  }).join('');

  g.innerHTML=`
    <h1>🕵️ Ton bilan</h1>
    <div class="score-big">${ok}/${total}</div>
    <div class="score-sub" style="color:${color}">${msg}</div>
    <div class="stat-badges">
      <span class="badge" style="background:#EAF3DE;color:#27500A">✅ ${ok} correctes</span>
      ${errors.length?`<span class="badge" style="background:#FCEBEB;color:#791F1F">❌ ${errors.length} ratées</span>`:''}
    </div>
    ${bycat?`<div class="cat-result-grid">${bycat}</div>`:''}
    ${errorSection}
    <div class="tip">🛡️ <b>Les règles d'or anti-arnaque :</b><br>
    • Ta banque ne demande JAMAIS ton code ou numéro de carte par téléphone ou SMS<br>
    • Un vrai organisme ne crée pas d'urgence artificielle<br>
    • Vérifie toujours l'URL : une lettre changée = faux site<br>
    • Si tu doutes, raccroche et rappelle le numéro officiel<br>
    • Un cadeau 'gratuit' avec frais de port = arnaque</div>
    <button class="btn btn-p" onclick="startCat(S.catId||'sms')">Rejouer</button>
    <button class="btn" onclick="S.screen='menu';render()">Choisir une catégorie</button>`;
}

render();
</script>
